appId: com.yogiya.app
tags:
  - onboarding
  - core
---
# 온보딩 플로우
# 첫 실행 유저가 캐릭터를 선택하고 이름을 입력해서 시작하는 플로우

- launchApp:
    clearState: true

# 온보딩 화면이 보여야 한다
- assertVisible: "시작하기"
- assertVisible: "캐릭터를 선택하고 이름을 입력해주세요"

# 이름 입력 필드 확인
- assertVisible: "친구들에게 보일 이름"

# 시작 버튼이 비활성 상태여야 한다 (이름 미입력)
- assertVisible:
    id: "start_button"

# 이름 입력
- tapOn:
    id: "name_input"
- inputText: "테스트유저"

# 캐릭터 목록이 남자/여자로 나뉘어 보여야 한다
- assertVisible: "남자"
- assertVisible: "여자"

# 기본 선택은 boy_casual
- assertVisible:
    id: "character_boy_casual"

# 다른 캐릭터를 선택한다
- tapOn:
    id: "character_girl_school"

# 미리보기에 이름이 표시되어야 한다
- assertVisible: "테스트유저"

# 시작하기 버튼 탭
- tapOn:
    id: "start_button"

# 지도 화면으로 이동해야 한다
- assertVisible:
    id: "map_screen"
    timeout: 5000
