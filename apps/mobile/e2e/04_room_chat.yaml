appId: com.yogiya.app
tags:
  - room
  - chat
---
# 방 채팅 플로우
# 방에 들어간 상태에서 메시지를 보내는 플로우

- launchApp

# 지도 화면에서 방이 존재하는 상태여야 한다
- assertVisible:
    id: "map_screen"
    timeout: 5000

# 방이 없으면 먼저 생성
- runFlow:
    when:
      visible: "새 방 만들기"
    commands:
      - tapOn: "새 방 만들기"
      - assertVisible:
          text: "방 코드:.*"
          timeout: 5000

# 채팅 입력란에 메시지 입력
- tapOn: "메시지 입력..."
- inputText: "안녕하세요!"

# 전송
- pressKey: Enter

# 전송한 메시지가 채팅 패널에 보여야 한다
- assertVisible: "안녕하세요!"
